<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 664 728" width="664" height="728" class="cdm-term" role="img" aria-label="claude-desktop-merge dry-run terminal demo">
  <title>claude-desktop-merge — dry-run demo</title>
  <style>
    /* A terminal is a deliberately dark surface — single-theme by design so it reads
       the same (like a screenshot) on both a light and a dark host page. */
    .cdm-term{
      --bg:#0c0f17; --bar:#171b26; --stroke:#242a38;
      --fg:#c9d4de; --dim:#6b7a8c; --grn:#3fd07f; --cyn:#39c6da; --blu:#5aa2ff; --ylw:#e6b955; --red:#ff6b6b;
    }
    .cdm-win{fill:var(--bg);stroke:var(--stroke);}
    .cdm-bar{fill:var(--bar);}
    .cdm-term text{font-family:ui-monospace,"SF Mono",SFMono-Regular,Menlo,Monaco,"Cascadia Code","Roboto Mono",monospace;
         font-size:15px;fill:var(--fg);white-space:pre;}
    .cdm-title{fill:var(--dim);font-size:12.5px;letter-spacing:.4px;}
    .cdm-dim{fill:var(--dim);} .cdm-grn{fill:var(--grn);} .cdm-cyn{fill:var(--cyn);}
    .cdm-blu{fill:var(--blu);} .cdm-ylw{fill:var(--ylw);} .cdm-red{fill:var(--red);}
    .cdm-b{font-weight:700;}
    /* Resting state is fully visible; the reveal only plays forward via fill:backwards,
       so a renderer that strips CSS animation still shows the whole transcript. */
    .cdm-ln{opacity:1;animation:cdm-reveal .34s ease backwards;}
    @keyframes cdm-reveal{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}
    .cdm-cursor{fill:var(--grn);animation:cdm-blink 1.05s steps(1) infinite;}
    @keyframes cdm-blink{0%,50%{opacity:1;}50.01%,100%{opacity:0;}}
    @media (prefers-reduced-motion: reduce){
      .cdm-ln{animation:none;opacity:1;transform:none;} .cdm-cursor{animation:none;opacity:1;}
    }
  </style>
  <rect x="1" y="1" width="662" height="726" rx="12" class="cdm-win" stroke-width="1.5"/>
  <path d="M1 13 a12 12 0 0 1 12 -12 h638 a12 12 0 0 1 12 12 v27 h-662 z" class="cdm-bar"/>
  <circle cx="22" cy="20" r="6" fill="#ff5f57"/>
  <circle cx="42" cy="20" r="6" fill="#febc2e"/>
  <circle cx="62" cy="20" r="6" fill="#28c840"/>
  <text x="332" y="24" text-anchor="middle" class="cdm-title">claude-desktop-merge — dry run</text>
  <text y="73" class="cdm-ln" style="animation-delay:0.35s"><tspan x="26" class="cdm-grn">$ </tspan><tspan class="cdm-kw">npx claude-desktop-merge</tspan></text>
<text y="97" class="cdm-ln" style="animation-delay:0.67s"><tspan x="26" class="cdm-kw cdm-b">claude-desktop-merge</tspan><tspan class="cdm-dim"> (macOS)</tspan></text>
<text y="121" class="cdm-ln" style="animation-delay:0.99s"><tspan x="26" class="cdm-dim">BASE: </tspan><tspan class="cdm-cyn">~/Library/Application Support/Claude</tspan></text>
<text y="145" class="cdm-ln" style="animation-delay:1.31s"><tspan x="26" class="cdm-dim">Active account: </tspan><tspan class="cdm-grn">be60c637</tspan></text>
<text y="169" class="cdm-ln" style="animation-delay:1.63s"><tspan> </tspan></text>
<text y="193" class="cdm-ln" style="animation-delay:1.85s"><tspan x="26" class="cdm-b">Discovered locations:</tspan></text>
<text y="217" class="cdm-ln" style="animation-delay:2.17s"><tspan x="26" class="cdm-b">  1) </tspan><tspan class="cdm-cyn">be60c637/04127aae</tspan><tspan class="cdm-dim">  (102 sessions)</tspan><tspan class="cdm-grn">  [ACTIVE]</tspan></text>
<text y="241" class="cdm-ln" style="animation-delay:2.49s"><tspan x="26" class="cdm-dim">       · Refactor auth middleware</tspan></text>
<text y="265" class="cdm-ln" style="animation-delay:2.81s"><tspan x="26" class="cdm-dim">       · Wire up billing webhooks</tspan></text>
<text y="289" class="cdm-ln" style="animation-delay:3.13s"><tspan x="26" class="cdm-b">  2) </tspan><tspan class="cdm-cyn">d8755814/f9c0ba6b</tspan><tspan class="cdm-dim">  (47 sessions)</tspan></text>
<text y="313" class="cdm-ln" style="animation-delay:3.45s"><tspan x="26" class="cdm-dim">       · Fix flaky e2e test</tspan></text>
<text y="337" class="cdm-ln" style="animation-delay:3.77s"><tspan x="26" class="cdm-dim">       · Draft launch checklist</tspan></text>
<text y="361" class="cdm-ln" style="animation-delay:4.09s"><tspan> </tspan></text>
<text y="385" class="cdm-ln" style="animation-delay:4.32s"><tspan x="26" class="cdm-b">Choose CANONICAL location (number): </tspan><tspan class="cdm-grn">1</tspan></text>
<text y="409" class="cdm-ln" style="animation-delay:4.64s"><tspan x="26" class="cdm-b">Choose SOURCE location(s) — 'a' for all others: </tspan><tspan class="cdm-grn">a</tspan></text>
<text y="433" class="cdm-ln" style="animation-delay:4.96s"><tspan x="26" class="cdm-b">1) MERGE only  2) MERGE then LINK — choose [1/2]: </tspan><tspan class="cdm-grn">1</tspan></text>
<text y="457" class="cdm-ln" style="animation-delay:5.28s"><tspan> </tspan></text>
<text y="481" class="cdm-ln" style="animation-delay:5.50s"><tspan x="26" class="cdm-b">PLAN</tspan></text>
<text y="505" class="cdm-ln" style="animation-delay:5.82s"><tspan x="26" class="cdm-kw">  Canonical: </tspan><tspan class="cdm-cyn">be60c637/04127aae</tspan></text>
<text y="529" class="cdm-ln" style="animation-delay:6.14s"><tspan x="26" class="cdm-kw">  Source </tspan><tspan class="cdm-blu">d8755814/f9c0ba6b</tspan></text>
<text y="553" class="cdm-ln" style="animation-delay:6.46s"><tspan x="26" class="cdm-kw">    [claude-code-sessions] copy </tspan><tspan class="cdm-grn">47</tspan><tspan class="cdm-kw"> files, </tspan><tspan class="cdm-grn">0</tspan><tspan class="cdm-kw"> dirs; 0 conflicts</tspan></text>
<text y="577" class="cdm-ln" style="animation-delay:6.78s"><tspan x="26" class="cdm-kw">    [agent-mode] copy </tspan><tspan class="cdm-grn">41</tspan><tspan class="cdm-kw"> files, </tspan><tspan class="cdm-grn">6</tspan><tspan class="cdm-kw"> dirs; </tspan><tspan class="cdm-ylw">2</tspan><tspan class="cdm-kw"> conflicts </tspan><tspan class="cdm-dim">(kept canonical)</tspan></text>
<text y="601" class="cdm-ln" style="animation-delay:7.10s"><tspan> </tspan></text>
<text y="625" class="cdm-ln" style="animation-delay:7.33s"><tspan x="26" class="cdm-b">  Totals: </tspan><tspan class="cdm-grn">88</tspan><tspan class="cdm-kw"> file(s) + </tspan><tspan class="cdm-grn">6</tspan><tspan class="cdm-kw"> dir(s) to copy, </tspan><tspan class="cdm-ylw">2</tspan><tspan class="cdm-kw"> kept, </tspan><tspan class="cdm-grn">3</tspan><tspan class="cdm-kw"> space(s) added</tspan></text>
<text y="649" class="cdm-ln" style="animation-delay:7.65s"><tspan> </tspan></text>
<text y="673" class="cdm-ln" style="animation-delay:7.87s"><tspan x="26" class="cdm-ylw cdm-b">DRY RUN — no filesystem changes were made.</tspan></text>
<text y="697" class="cdm-ln" style="animation-delay:8.19s"><tspan x="26" class="cdm-dim">Re-run with </tspan><tspan class="cdm-cyn">--apply</tspan><tspan class="cdm-dim"> to execute the plan above.</tspan></text>
<rect x="444" y="688" width="9" height="17" class="cdm-cursor" style="animation-delay:8.71s"/>
</svg>
